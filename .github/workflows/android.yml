name: Android CI/CD

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ─────────────────────────────────────────
      # 1. Checkout
      # ─────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ─────────────────────────────────────────
      # 2. Environment info
      # ─────────────────────────────────────────
      - name: Show environment info
        run: |
          echo "========================================="
          echo "  Runner OS : ${{ runner.os }}"
          echo "  Actor     : ${{ github.actor }}"
          echo "  Ref       : ${{ github.ref }}"
          echo "  Event     : ${{ github.event_name }}"
          echo "  Run #     : ${{ github.run_number }}"
          echo "  Commit    : ${{ github.sha }}"
          echo "========================================="
          java -version 2>&1 || true
          grep distributionUrl gradle/wrapper/gradle-wrapper.properties || true

      # ─────────────────────────────────────────
      # 3. JDK 17
      # ─────────────────────────────────────────
      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      # ─────────────────────────────────────────
      # 4. Android SDK  (compileSdk=34)
      # ─────────────────────────────────────────
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install required SDK components
        run: |
          yes | sdkmanager --licenses 2>/dev/null || true
          sdkmanager \
            "platform-tools" \
            "platforms;android-34" \
            "build-tools;34.0.0"

      # ─────────────────────────────────────────
      # 5. Fix gradlew + repair wrapper JAR
      #
      #    JAR di repo 0 bytes.
      #    Strategi: download gradle-bin.zip lalu
      #    unzip ke /tmp (jangan pipe ke stdout —
      #    crash pada file besar), kemudian cp jar.
      # ─────────────────────────────────────────
      - name: Fix gradlew & repair wrapper JAR
        run: |
          chmod +x gradlew
          sed -i 's/\r$//' gradlew

          JAR="gradle/wrapper/gradle-wrapper.jar"
          JAR_SIZE=$(stat -c%s "$JAR" 2>/dev/null || echo 0)
          echo "=== wrapper JAR size: ${JAR_SIZE} bytes ==="

          if [ "$JAR_SIZE" -lt 10000 ]; then
            GRADLE_VERSION="8.6"
            ZIP_FILE="/tmp/gradle-bin.zip"
            EXTRACT_DIR="/tmp/gradle-extract"

            echo ">>> Downloading gradle-${GRADLE_VERSION}-bin.zip ..."
            curl -sSfL --retry 3 --retry-delay 5 \
              "https://services.gradle.org/distributions/gradle-${GRADLE_VERSION}-bin.zip" \
              -o "$ZIP_FILE"
            echo "Download OK: $(du -h "$ZIP_FILE" | cut -f1)"

            # Cari nama jar yang tepat dulu (tanpa extract semua)
            echo ">>> Mencari gradle-wrapper.jar di dalam zip..."
            JAR_ENTRY=$(unzip -l "$ZIP_FILE" \
              | awk '{print $4}' \
              | grep "lib/gradle-wrapper" \
              | grep "\.jar$" \
              | head -1)
            echo "Found entry: ${JAR_ENTRY}"

            # Extract HANYA jar itu ke folder temp (bukan pipe ke stdout)
            mkdir -p "$EXTRACT_DIR"
            unzip -j "$ZIP_FILE" "$JAR_ENTRY" -d "$EXTRACT_DIR"

            # Copy ke lokasi yang benar
            EXTRACTED_JAR=$(find "$EXTRACT_DIR" -name "*.jar" | head -1)
            echo "Extracted: $EXTRACTED_JAR ($(stat -c%s "$EXTRACTED_JAR") bytes)"
            cp "$EXTRACTED_JAR" "$JAR"

            # Cleanup
            rm -rf "$ZIP_FILE" "$EXTRACT_DIR"

            FINAL=$(stat -c%s "$JAR" 2>/dev/null || echo 0)
            echo "=== Final JAR: ${FINAL} bytes ==="
            [ "$FINAL" -lt 10000 ] && { echo "REPAIR GAGAL"; exit 1; }
            echo "JAR repaired OK"
          else
            echo "JAR OK (${JAR_SIZE} bytes) — skip repair"
          fi

          ls -lh gradle/wrapper/

      # ─────────────────────────────────────────
      # 6. Setup Gradle cache
      # ─────────────────────────────────────────
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      # ─────────────────────────────────────────
      # 7. Verify Gradle
      # ─────────────────────────────────────────
      - name: Print Gradle version
        run: ./gradlew --version

      # ─────────────────────────────────────────
      # 8. Build Debug APK
      # ─────────────────────────────────────────
      - name: Build Debug APK
        run: |
          echo "=== Starting build ==="
          ./gradlew assembleDebug \
            --stacktrace \
            --info \
            --no-daemon \
            -Dorg.gradle.jvmargs="-Xmx2048m -XX:MaxMetaspaceSize=512m" \
            2>&1 | tee build_output.log
          echo "=== Build finished ==="

      # ─────────────────────────────────────────
      # 9. Verify APK
      # ─────────────────────────────────────────
      - name: Verify APK exists
        run: |
          APK="app/build/outputs/apk/debug/app-debug.apk"
          if [ -f "$APK" ]; then
            echo "APK FOUND"
            ls -lh "$APK"
          else
            echo "APK NOT FOUND — listing build outputs:"
            find app/build/outputs -type f 2>/dev/null || echo "(no outputs dir)"
            exit 1
          fi

      # ─────────────────────────────────────────
      # 10. Upload APK
      # ─────────────────────────────────────────
      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: MusicPlayer-debug-${{ github.run_number }}
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 14

      # ─────────────────────────────────────────
      # 11. Upload build log (selalu)
      # ─────────────────────────────────────────
      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-${{ github.run_number }}
          path: build_output.log
          retention-days: 7

      # ─────────────────────────────────────────
      # 12. Upload Gradle reports saat gagal
      # ─────────────────────────────────────────
      - name: Upload Gradle failure logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: gradle-failure-logs-${{ github.run_number }}
          path: |
            build_output.log
            app/build/reports/
            ~/.gradle/daemon/**/daemon-*.log
          retention-days: 7

      # ─────────────────────────────────────────
      # 13. Create GitHub Release
      #     Hanya saat push ke main/master
      # ─────────────────────────────────────────
      - name: Create GitHub Release
        if: >-
          success() &&
          github.event_name == 'push' &&
          (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: "MusicPlayer Build #${{ github.run_number }}"
          body: |
            🎵 **MusicPlayer Debug Build**

            - Commit : `${{ github.sha }}`
            - Branch : `${{ github.ref_name }}`
            - Run    : #${{ github.run_number }}
            - Actor  : ${{ github.actor }}
          files: app/build/outputs/apk/debug/app-debug.apk
          draft: false
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
