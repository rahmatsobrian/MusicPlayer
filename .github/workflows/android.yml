name: Android CI/CD

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ─────────────────────────────────────────
      # 1. Checkout
      # ─────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ─────────────────────────────────────────
      # 2. Environment info
      # ─────────────────────────────────────────
      - name: Show environment info
        run: |
          echo "========================================="
          echo "  Runner OS : ${{ runner.os }}"
          echo "  Actor     : ${{ github.actor }}"
          echo "  Ref       : ${{ github.ref }}"
          echo "  Event     : ${{ github.event_name }}"
          echo "  Run #     : ${{ github.run_number }}"
          echo "  Commit    : ${{ github.sha }}"
          echo "========================================="
          java -version 2>&1 || true
          echo "-----------------------------------------"
          grep distributionUrl gradle/wrapper/gradle-wrapper.properties || true

      # ─────────────────────────────────────────
      # 3. JDK 17
      # ─────────────────────────────────────────
      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      # ─────────────────────────────────────────
      # 4. Android SDK  (compileSdk=34)
      # ─────────────────────────────────────────
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install required SDK components
        run: |
          yes | sdkmanager --licenses 2>/dev/null || true
          sdkmanager \
            "platform-tools" \
            "platforms;android-34" \
            "build-tools;34.0.0"
          sdkmanager --list_installed 2>/dev/null \
            | grep -E "(platform-tools|platforms;android|build-tools)" || true

      # ─────────────────────────────────────────
      # 5. Fix gradlew + repair wrapper JAR
      #
      #    JAR di repo 0 bytes → download zip
      #    distribusi Gradle dari services.gradle.org
      #    lalu ekstrak gradle-wrapper.jar dari
      #    dalam zip (tidak perlu extract semua).
      # ─────────────────────────────────────────
      - name: Fix gradlew & repair wrapper JAR
        run: |
          chmod +x gradlew
          sed -i 's/\r$//' gradlew

          JAR="gradle/wrapper/gradle-wrapper.jar"
          JAR_SIZE=$(stat -c%s "$JAR" 2>/dev/null || echo 0)
          echo "=== wrapper JAR size: ${JAR_SIZE} bytes ==="

          if [ "$JAR_SIZE" -lt 10000 ]; then
            GRADLE_VERSION="8.6"
            ZIP_URL="https://services.gradle.org/distributions/gradle-${GRADLE_VERSION}-bin.zip"
            ZIP_FILE="/tmp/gradle-${GRADLE_VERSION}-bin.zip"

            echo "Downloading gradle-${GRADLE_VERSION}-bin.zip ..."
            curl -sSfL --retry 3 --retry-delay 5 \
              "$ZIP_URL" -o "$ZIP_FILE"
            echo "Download OK: $(du -h "$ZIP_FILE" | cut -f1)"

            echo "Extracting gradle-wrapper.jar ..."
            # gradle-wrapper.jar ada di lib/ dalam zip
            unzip -p "$ZIP_FILE" \
              "gradle-${GRADLE_VERSION}/lib/gradle-wrapper-${GRADLE_VERSION}.jar" \
              > "$JAR" 2>/dev/null

            # fallback nama file tanpa versi
            if [ "$(stat -c%s "$JAR")" -lt 10000 ]; then
              unzip -p "$ZIP_FILE" \
                "gradle-${GRADLE_VERSION}/lib/gradle-wrapper.jar" \
                > "$JAR" 2>/dev/null
            fi

            # fallback: grep nama file yang benar dari dalam zip
            if [ "$(stat -c%s "$JAR")" -lt 10000 ]; then
              echo "Mencari nama jar yang tepat di dalam zip..."
              JAR_PATH=$(unzip -l "$ZIP_FILE" \
                | grep "gradle-wrapper" \
                | grep "\.jar" \
                | awk '{print $4}' \
                | head -1)
              echo "Found: $JAR_PATH"
              unzip -p "$ZIP_FILE" "$JAR_PATH" > "$JAR"
            fi

            rm -f "$ZIP_FILE"
            FINAL=$(stat -c%s "$JAR" 2>/dev/null || echo 0)
            echo "=== Final JAR: ${FINAL} bytes ==="
            [ "$FINAL" -lt 10000 ] && { echo "REPAIR GAGAL"; exit 1; }
            echo "JAR repaired OK"
          else
            echo "JAR OK — skip repair"
          fi
          ls -lh gradle/wrapper/

      # ─────────────────────────────────────────
      # 6. Setup Gradle cache
      # ─────────────────────────────────────────
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      # ─────────────────────────────────────────
      # 7. Verify Gradle
      # ─────────────────────────────────────────
      - name: Print Gradle version
        run: ./gradlew --version

      # ─────────────────────────────────────────
      # 8. Build Debug APK
      # ─────────────────────────────────────────
      - name: Build Debug APK
        run: |
          echo "=== Starting build ==="
          ./gradlew assembleDebug \
            --stacktrace \
            --info \
            --no-daemon \
            -Dorg.gradle.jvmargs="-Xmx2048m -XX:MaxMetaspaceSize=512m" \
            2>&1 | tee build_output.log
          echo "=== Build finished ==="

      # ─────────────────────────────────────────
      # 9. Verify APK
      # ─────────────────────────────────────────
      - name: Verify APK exists
        run: |
          APK="app/build/outputs/apk/debug/app-debug.apk"
          if [ -f "$APK" ]; then
            echo "APK FOUND"
            ls -lh "$APK"
          else
            echo "APK NOT FOUND — listing build outputs:"
            find app/build/outputs -type f 2>/dev/null || echo "(no outputs dir)"
            exit 1
          fi

      # ─────────────────────────────────────────
      # 10. Upload APK
      # ─────────────────────────────────────────
      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: MusicPlayer-debug-${{ github.run_number }}
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 14

      # ─────────────────────────────────────────
      # 11. Upload build log (selalu)
      # ─────────────────────────────────────────
      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-${{ github.run_number }}
          path: build_output.log
          retention-days: 7

      # ─────────────────────────────────────────
      # 12. Upload Gradle reports saat gagal
      # ─────────────────────────────────────────
      - name: Upload Gradle failure logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: gradle-failure-logs-${{ github.run_number }}
          path: |
            build_output.log
            app/build/reports/
            ~/.gradle/daemon/**/daemon-*.log
          retention-days: 7

      # ─────────────────────────────────────────
      # 13. Create GitHub Release
      #     Hanya saat push ke main/master
      # ─────────────────────────────────────────
      - name: Create GitHub Release
        if: >-
          success() &&
          github.event_name == 'push' &&
          (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: "MusicPlayer Build #${{ github.run_number }}"
          body: |
            🎵 **MusicPlayer Debug Build**

            - Commit : `${{ github.sha }}`
            - Branch : `${{ github.ref_name }}`
            - Run    : #${{ github.run_number }}
            - Actor  : ${{ github.actor }}
          files: app/build/outputs/apk/debug/app-debug.apk
          draft: false
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
