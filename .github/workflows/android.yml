name: Android CI/CD

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ─────────────────────────────────────────
      # 1. Checkout
      # ─────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ─────────────────────────────────────────
      # 2. Environment info
      # ─────────────────────────────────────────
      - name: Show environment info
        run: |
          echo "========================================="
          echo "  Runner OS : ${{ runner.os }}"
          echo "  Actor     : ${{ github.actor }}"
          echo "  Ref       : ${{ github.ref }}"
          echo "  Event     : ${{ github.event_name }}"
          echo "  Run #     : ${{ github.run_number }}"
          echo "  Commit    : ${{ github.sha }}"
          echo "========================================="
          java -version 2>&1 || true
          echo "-----------------------------------------"
          echo "Gradle wrapper version (declared):"
          grep distributionUrl gradle/wrapper/gradle-wrapper.properties || true

      # ─────────────────────────────────────────
      # 3. JDK 17
      # ─────────────────────────────────────────
      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      # ─────────────────────────────────────────
      # 4. Android SDK  (compileSdk=34)
      # ─────────────────────────────────────────
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install required SDK components
        run: |
          echo "=== Accepting SDK licenses ==="
          yes | sdkmanager --licenses 2>/dev/null || true
          echo "=== Installing SDK components ==="
          sdkmanager \
            "platform-tools" \
            "platforms;android-34" \
            "build-tools;34.0.0"
          echo "=== Installed packages ==="
          sdkmanager --list_installed 2>/dev/null \
            | grep -E "(platform-tools|platforms;android|build-tools)" || true

      # ─────────────────────────────────────────
      # 5. Fix gradlew permission
      # ─────────────────────────────────────────
      - name: Fix gradlew permission
        run: |
          chmod +x gradlew
          sed -i 's/\r$//' gradlew
          echo "gradlew: $(ls -lh gradlew)"

      # ─────────────────────────────────────────
      # 6. Setup Gradle 8.6
      #    gradle-version: "8.6" → setup-gradle
      #    download & cache Gradle 8.6 ke
      #    ~/.gradle/wrapper/dists/
      # ─────────────────────────────────────────
      - name: Setup Gradle 8.6
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: "8.6"

      # ─────────────────────────────────────────
      # 7. Repair gradle-wrapper.jar
      #    JAR di repo 0 bytes → ambil dari cache
      #    yang baru di-download setup-gradle
      # ─────────────────────────────────────────
      - name: Repair gradle-wrapper.jar
        run: |
          JAR="gradle/wrapper/gradle-wrapper.jar"
          JAR_SIZE=$(stat -c%s "$JAR" 2>/dev/null || echo 0)
          echo "=== Current JAR size: ${JAR_SIZE} bytes ==="

          if [ "$JAR_SIZE" -lt 10000 ]; then
            echo "JAR kosong — mencari di cache..."

            # Cari jar yang sudah di-extract oleh setup-gradle
            CACHED_JAR=$(find "$HOME/.gradle/wrapper/dists" \
              -name "gradle-wrapper.jar" 2>/dev/null | head -1)

            if [ -n "$CACHED_JAR" ]; then
              echo "Found cached jar: $CACHED_JAR ($(stat -c%s "$CACHED_JAR") bytes)"
              cp "$CACHED_JAR" "$JAR"
            else
              # Fallback: ekstrak dari zip distribusi
              echo "Jar belum extracted, mencari zip distribusi..."
              DIST_ZIP=$(find "$HOME/.gradle/wrapper/dists" \
                -name "gradle-8.6-bin.zip" 2>/dev/null | head -1)

              if [ -n "$DIST_ZIP" ]; then
                echo "Found zip: $DIST_ZIP"
                # Coba beberapa path dalam zip
                unzip -p "$DIST_ZIP" "gradle-8.6/lib/gradle-wrapper-8.6.jar" \
                  > "$JAR" 2>/dev/null || \
                unzip -p "$DIST_ZIP" "gradle-8.6/lib/gradle-wrapper.jar" \
                  > "$JAR" 2>/dev/null || true
              fi
            fi

            FINAL_SIZE=$(stat -c%s "$JAR" 2>/dev/null || echo 0)
            if [ "$FINAL_SIZE" -lt 10000 ]; then
              echo "Repair gagal (size: ${FINAL_SIZE}). Dump cache structure:"
              find "$HOME/.gradle/wrapper/dists" -type f | head -30 || true
              exit 1
            fi
            echo "JAR repaired: ${FINAL_SIZE} bytes"
          else
            echo "JAR OK (${JAR_SIZE} bytes) — skip repair"
          fi
          ls -lh gradle/wrapper/

      # ─────────────────────────────────────────
      # 8. Verify Gradle
      # ─────────────────────────────────────────
      - name: Print Gradle version
        run: ./gradlew --version

      # ─────────────────────────────────────────
      # 9. Build Debug APK
      # ─────────────────────────────────────────
      - name: Build Debug APK
        run: |
          echo "=== Starting build ==="
          ./gradlew assembleDebug \
            --stacktrace \
            --info \
            --no-daemon \
            -Dorg.gradle.jvmargs="-Xmx2048m -XX:MaxMetaspaceSize=512m" \
            2>&1 | tee build_output.log
          echo "=== Build finished ==="

      # ─────────────────────────────────────────
      # 10. Verify APK
      # ─────────────────────────────────────────
      - name: Verify APK exists
        run: |
          APK="app/build/outputs/apk/debug/app-debug.apk"
          if [ -f "$APK" ]; then
            echo "APK FOUND"
            ls -lh "$APK"
          else
            echo "APK NOT FOUND — listing build outputs:"
            find app/build/outputs -type f 2>/dev/null || echo "(no outputs dir)"
            exit 1
          fi

      # ─────────────────────────────────────────
      # 11. Upload APK
      # ─────────────────────────────────────────
      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: MusicPlayer-debug-${{ github.run_number }}
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 14

      # ─────────────────────────────────────────
      # 12. Upload build log (selalu)
      # ─────────────────────────────────────────
      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-${{ github.run_number }}
          path: build_output.log
          retention-days: 7

      # ─────────────────────────────────────────
      # 13. Upload Gradle reports saat gagal
      # ─────────────────────────────────────────
      - name: Upload Gradle failure logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: gradle-failure-logs-${{ github.run_number }}
          path: |
            build_output.log
            app/build/reports/
            ~/.gradle/daemon/**/daemon-*.log
          retention-days: 7

      # ─────────────────────────────────────────
      # 14. Create GitHub Release
      #     Hanya saat push ke main/master
      # ─────────────────────────────────────────
      - name: Create GitHub Release
        if: >-
          success() &&
          github.event_name == 'push' &&
          (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: "MusicPlayer Build #${{ github.run_number }}"
          body: |
            🎵 **MusicPlayer Debug Build**

            - Commit : `${{ github.sha }}`
            - Branch : `${{ github.ref_name }}`
            - Run    : #${{ github.run_number }}
            - Actor  : ${{ github.actor }}
          files: app/build/outputs/apk/debug/app-debug.apk
          draft: false
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
