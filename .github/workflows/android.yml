name: Android CI/CD

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # 1. Checkout
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Info
      - name: Show environment info
        run: |
          echo "Runner OS : ${{ runner.os }}"
          echo "Branch    : ${{ github.ref }}"
          echo "Actor     : ${{ github.actor }}"
          java -version || true

      # 3. Setup JDK 17
      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      # 4. Setup Android SDK
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK
        run: |
          yes | sdkmanager --licenses || true
          sdkmanager \
            "platform-tools" \
            "platforms;android-34" \
            "build-tools;34.0.0"

      # 5. Fix Gradle Wrapper
      - name: Fix Gradle Wrapper
        run: |
          chmod +x gradlew
          sed -i 's/\r$//' gradlew

          JAR="gradle/wrapper/gradle-wrapper.jar"
          SIZE=$(stat -c%s "$JAR" 2>/dev/null || echo 0)

          echo "Wrapper size: $SIZE"

          if [ "$SIZE" -lt 50000 ]; then
            echo "Downloading official wrapper..."

            curl -L \
              https://raw.githubusercontent.com/gradle/gradle/v8.6.0/gradle/wrapper/gradle-wrapper.jar \
              -o "$JAR"

            stat -c%s "$JAR"
          else
            echo "Wrapper OK"
          fi

      # 6. Fix distribution
      - name: Fix gradle-wrapper.properties
        run: |
          sed -i 's|distributionUrl=.*|distributionUrl=https\://services.gradle.org/distributions/gradle-8.6-bin.zip|' gradle/wrapper/gradle-wrapper.properties
          cat gradle/wrapper/gradle-wrapper.properties

      # 7. Setup Gradle
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      # 8. Test Gradle
      - name: Check Gradle
        run: ./gradlew --version

      # 9. Clean project
      - name: Clean project
        run: ./gradlew clean

      # 10. Build APK (🔥 FIX PIPEFAIL)
      - name: Build Debug APK
        run: |
          set -o pipefail

          echo "=== BUILD START ==="

          ./gradlew assembleDebug \
            --stacktrace \
            --info \
            --no-daemon \
            -Dorg.gradle.jvmargs="-Xmx2g -XX:MaxMetaspaceSize=512m" \
            2>&1 | tee build.log

          echo "=== BUILD END ==="

      # 11. Debug output
      - name: Debug build output
        if: always()
        run: |
          echo "=== SEARCH APK ==="
          find . -name "*.apk" || true

          echo "=== BUILD FOLDERS ==="
          find . -type d -name build | head -20

      # 12. Find APK (AUTO DETECT)
      - name: Find APK
        run: |
          APK_PATH=$(find . -type f -name "*.apk" | head -1)

          if [ -z "$APK_PATH" ]; then
            echo "APK TIDAK DITEMUKAN ❌"
            exit 1
          fi

          echo "APK FOUND ✅"
          echo "Path: $APK_PATH"
          ls -lh "$APK_PATH"

          echo "APK_PATH=$APK_PATH" >> $GITHUB_ENV

      # 13. Upload APK
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: MusicPlayer-${{ github.run_number }}
          path: ${{ env.APK_PATH }}
          retention-days: 14

      # 14. Upload Log
      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-${{ github.run_number }}
          path: build.log
          retention-days: 7

      # 15. Upload failure logs
      - name: Upload failure logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: gradle-failure-${{ github.run_number }}
          path: |
            build.log
            app/build/reports/
            ~/.gradle/daemon/**/daemon-*.log

      # 16. Release
      - name: Create Release
        if: >
          success() &&
          github.event_name == 'push' &&
          (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: "MusicPlayer Build #${{ github.run_number }}"
          files: ${{ env.APK_PATH }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
