name: Android CI/CD

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # 1. Checkout
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Info
      - name: Show environment info
        run: |
          echo "Runner OS : ${{ runner.os }}"
          echo "Branch    : ${{ github.ref }}"
          echo "Actor     : ${{ github.actor }}"
          java -version || true

      # 3. Setup JDK
      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      # 4. Android SDK
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK
        run: |
          yes | sdkmanager --licenses || true
          sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      # 5. Fix Wrapper
      - name: Fix Gradle Wrapper
        run: |
          chmod +x gradlew
          sed -i 's/\r$//' gradlew

          if [ ! -s gradle/wrapper/gradle-wrapper.jar ]; then
            curl -L https://raw.githubusercontent.com/gradle/gradle/v8.6.0/gradle/wrapper/gradle-wrapper.jar \
              -o gradle/wrapper/gradle-wrapper.jar
          fi

      # 6. Fix distribution
      - name: Fix wrapper properties
        run: |
          sed -i 's|distributionUrl=.*|distributionUrl=https\://services.gradle.org/distributions/gradle-8.6-bin.zip|' gradle/wrapper/gradle-wrapper.properties

      # 7. Gradle cache
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      # 8. Test Gradle
      - name: Check Gradle
        run: ./gradlew --version

      # 9. Clean
      - name: Clean project
        run: ./gradlew clean

      # 10. Resolve dependencies (NO FAIL)
      - name: Resolve dependencies
        run: ./gradlew dependencies --refresh-dependencies || true

      # 11. Build APK (WAJIB SUKSES)
      - name: Build Debug APK
        run: |
          set -o pipefail

          export GRADLE_OPTS="-Xmx2g -XX:MaxMetaspaceSize=512m"

          ./gradlew assembleDebug \
            --stacktrace \
            --info \
            --no-daemon \
            2>&1 | tee build.log

      # 12. Debug (NO FAIL)
      - name: Debug output
        if: always()
        run: |
          echo "=== APK SEARCH ==="
          find . -name "*.apk" || true

      # 13. Find APK (NO FAIL)
      - name: Find APK
        id: find_apk
        run: |
          APK_PATH=$(find . -type f -name "*.apk" | head -1)

          if [ -z "$APK_PATH" ]; then
            echo "APK_NOT_FOUND=true" >> $GITHUB_ENV
          else
            echo "APK_PATH=$APK_PATH" >> $GITHUB_ENV
          fi

      # 14. Upload APK (NO FAIL)
      - name: Upload APK
        if: env.APK_PATH != ''
        uses: actions/upload-artifact@v4
        with:
          name: MusicPlayer-${{ github.run_number }}
          path: ${{ env.APK_PATH }}

      # 15. Upload log (SELALU)
      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-${{ github.run_number }}
          path: build.log

      # 16. Release (HANYA JIKA APK ADA)
      - name: Create Release
        if: success() && env.APK_PATH != '' && github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: "MusicPlayer Build #${{ github.run_number }}"
          files: ${{ env.APK_PATH }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
