name: Android CI/CD

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ─────────────────────────────────────────
      # 1. Checkout
      # ─────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ─────────────────────────────────────────
      # 2. Environment info
      # ─────────────────────────────────────────
      - name: Show environment info
        run: |
          echo "Runner OS    : ${{ runner.os }}"
          echo "Ref          : ${{ github.ref }}"
          echo "Actor        : ${{ github.actor }}"
          echo "Run number   : ${{ github.run_number }}"
          java -version || true

      # ─────────────────────────────────────────
      # 3. Setup JDK
      # ─────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # ─────────────────────────────────────────
      # 4. Setup Android SDK
      # ─────────────────────────────────────────
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK packages
        run: |
          yes | sdkmanager --licenses || true
          sdkmanager "platform-tools" "build-tools;34.0.0" "platforms;android-34"

      # ─────────────────────────────────────────
      # 5. Setup Gradle
      # ─────────────────────────────────────────
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      # ─────────────────────────────────────────
      # 6. SUPER FIX WRAPPER 🔥
      # ─────────────────────────────────────────
      - name: Fix Gradle Wrapper
        run: |
          echo "=== FIXING WRAPPER ==="

          mkdir -p gradle/wrapper

          # Download wrapper jar
          if [ ! -f gradle/wrapper/gradle-wrapper.jar ]; then
            echo "Downloading gradle-wrapper.jar..."
            curl -L -o gradle/wrapper/gradle-wrapper.jar \
              https://raw.githubusercontent.com/gradle/gradle/master/gradle/wrapper/gradle-wrapper.jar
          fi

          # Create properties
          if [ ! -f gradle/wrapper/gradle-wrapper.properties ]; then
            echo "distributionUrl=https\\://services.gradle.org/distributions/gradle-8.7-bin.zip" > gradle/wrapper/gradle-wrapper.properties
          fi

          # Download gradlew
          if [ ! -f gradlew ]; then
            echo "Downloading gradlew..."
            curl -L -o gradlew https://raw.githubusercontent.com/gradle/gradle/master/gradlew
          fi

          # Fix CRLF issue
          sed -i 's/\r$//' gradlew

          chmod +x gradlew

          echo "=== WRAPPER READY ==="

      # ─────────────────────────────────────────
      # 7. Debug wrapper
      # ─────────────────────────────────────────
      - name: Verify wrapper
        run: |
          ls -la gradle/wrapper
          ls -la gradlew

      # ─────────────────────────────────────────
      # 8. Check Gradle
      # ─────────────────────────────────────────
      - name: Gradle version
        run: ./gradlew --version

      # ─────────────────────────────────────────
      # 9. Build APK
      # ─────────────────────────────────────────
      - name: Build Debug APK
        run: |
          ./gradlew assembleDebug \
            --stacktrace \
            --info \
            -Dorg.gradle.jvmargs="-Xmx2048m -XX:MaxMetaspaceSize=512m"

      # ─────────────────────────────────────────
      # 10. Verify APK
      # ─────────────────────────────────────────
      - name: Verify APK
        run: |
          APK="app/build/outputs/apk/debug/app-debug.apk"
          if [ -f "$APK" ]; then
            echo "✅ APK FOUND"
            ls -lh $APK
          else
            echo "❌ APK NOT FOUND"
            exit 1
          fi

      # ─────────────────────────────────────────
      # 11. Upload APK
      # ─────────────────────────────────────────
      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-${{ github.run_number }}
          path: app/build/outputs/apk/debug/app-debug.apk

      # ─────────────────────────────────────────
      # 12. Upload logs (fail)
      # ─────────────────────────────────────────
      - name: Upload logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: logs-${{ github.run_number }}
          path: |
            app/build/
            build/

      # ─────────────────────────────────────────
      # 13. Release
      # ─────────────────────────────────────────
      - name: Create Release
        if: success() && github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: Build #${{ github.run_number }}
          files: app/build/outputs/apk/debug/app-debug.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
