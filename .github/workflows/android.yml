name: Android CI/CD

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # 1. Checkout
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Debug Info
      - name: Show environment info
        run: |
          echo "Runner OS : ${{ runner.os }}"
          echo "Branch    : ${{ github.ref }}"
          java -version || true

      # 3. Setup JDK 17
      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      # 4. Setup Android SDK
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK components
        run: |
          yes | sdkmanager --licenses || true
          sdkmanager \
            "platform-tools" \
            "platforms;android-34" \
            "build-tools;34.0.0"

      # 5. Fix gradlew & wrapper (ANTI ERROR PALING PENTING)
      - name: Fix Gradle Wrapper
        run: |
          chmod +x gradlew
          sed -i 's/\r$//' gradlew

          JAR="gradle/wrapper/gradle-wrapper.jar"
          SIZE=$(stat -c%s "$JAR" 2>/dev/null || echo 0)

          echo "Wrapper size: $SIZE"

          if [ "$SIZE" -lt 10000 ]; then
            echo "Wrapper rusak → repairing..."

            curl -L https://services.gradle.org/distributions/gradle-8.6-bin.zip -o gradle.zip
            unzip -q gradle.zip

            cp gradle-8.6/lib/gradle-wrapper-*.jar "$JAR"

            echo "Wrapper fixed:"
            stat -c%s "$JAR"
          else
            echo "Wrapper OK"
          fi

      # 6. Setup Gradle cache
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      # 7. Verify Gradle
      - name: Check Gradle
        run: ./gradlew --version

      # 8. Build APK (FULL DEBUG LOG)
      - name: Build Debug APK
        run: |
          ./gradlew assembleDebug \
            --stacktrace \
            --info \
            --no-daemon \
            -Dorg.gradle.jvmargs="-Xmx2g -XX:MaxMetaspaceSize=512m" \
            2>&1 | tee build.log

      # 9. Verify APK
      - name: Verify APK
        run: |
          APK="app/build/outputs/apk/debug/app-debug.apk"

          if [ -f "$APK" ]; then
            echo "APK FOUND ✅"
            ls -lh "$APK"
          else
            echo "APK NOT FOUND ❌"
            echo "Isi folder build:"
            find app/build || true
            exit 1
          fi

      # 10. Upload APK
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: MusicPlayer-debug-${{ github.run_number }}
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 14

      # 11. Upload Log (WAJIB)
      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-${{ github.run_number }}
          path: build.log
          retention-days: 7

      # 12. Upload Failure Logs
      - name: Upload failure logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: gradle-failure-${{ github.run_number }}
          path: |
            build.log
            app/build/reports/
            ~/.gradle/daemon/**/daemon-*.log

      # 13. Auto Release
      - name: Create Release
        if: >
          success() &&
          github.event_name == 'push' &&
          (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: "MusicPlayer Build #${{ github.run_number }}"
          files: app/build/outputs/apk/debug/app-debug.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
