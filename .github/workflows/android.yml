name: Android CI/CD

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ─────────────────────────────────────────
      # 1. Checkout
      # ─────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ─────────────────────────────────────────
      # 2. Info
      # ─────────────────────────────────────────
      - name: Show environment info
        run: |
          echo "Runner OS: ${{ runner.os }}"
          echo "Actor    : ${{ github.actor }}"
          echo "Run no   : ${{ github.run_number }}"
          java -version || true

      # ─────────────────────────────────────────
      # 3. JDK
      # ─────────────────────────────────────────
      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      # ─────────────────────────────────────────
      # 4. Android SDK
      # ─────────────────────────────────────────
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK
        run: |
          yes | sdkmanager --licenses || true
          sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      # ─────────────────────────────────────────
      # 5. Setup Gradle (IMPORTANT)
      # ─────────────────────────────────────────
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      # ─────────────────────────────────────────
      # 6. GENERATE WRAPPER (FIX UTAMA 🔥)
      # ─────────────────────────────────────────
      - name: Generate Gradle Wrapper
        run: |
          echo "=== GENERATE WRAPPER ==="

          # kalau tidak ada settings.gradle → buat minimal
          if [ ! -f settings.gradle ] && [ ! -f settings.gradle.kts ]; then
            echo "rootProject.name = 'ci-temp'" > settings.gradle
          fi

          # generate wrapper resmi
          gradle wrapper --gradle-version 8.7 --no-daemon

          echo "=== DONE ==="

      # ─────────────────────────────────────────
      # 7. Fix gradlew (WAJIB)
      # ─────────────────────────────────────────
      - name: Fix gradlew
        run: |
          chmod +x gradlew
          sed -i 's/\r$//' gradlew

      # ─────────────────────────────────────────
      # 8. Debug wrapper
      # ─────────────────────────────────────────
      - name: Check wrapper
        run: |
          echo "--- gradle/wrapper ---"
          ls -la gradle/wrapper
          file gradle/wrapper/gradle-wrapper.jar

      # ─────────────────────────────────────────
      # 9. Gradle version
      # ─────────────────────────────────────────
      - name: Gradle version
        run: ./gradlew --version

      # ─────────────────────────────────────────
      # 10. Build APK
      # ─────────────────────────────────────────
      - name: Build Debug APK
        run: |
          ./gradlew assembleDebug \
            --stacktrace \
            --info \
            -Dorg.gradle.jvmargs="-Xmx2048m -XX:MaxMetaspaceSize=512m"

      # ─────────────────────────────────────────
      # 11. Verify APK
      # ─────────────────────────────────────────
      - name: Verify APK
        run: |
          APK="app/build/outputs/apk/debug/app-debug.apk"
          if [ -f "$APK" ]; then
            echo "✅ APK FOUND"
            ls -lh $APK
          else
            echo "❌ APK NOT FOUND"
            exit 1
          fi

      # ─────────────────────────────────────────
      # 12. Upload APK
      # ─────────────────────────────────────────
      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-${{ github.run_number }}
          path: app/build/outputs/apk/debug/app-debug.apk

      # ─────────────────────────────────────────
      # 13. Upload logs (fail)
      # ─────────────────────────────────────────
      - name: Upload logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: logs-${{ github.run_number }}
          path: |
            app/build/
            build/

      # ─────────────────────────────────────────
      # 14. Release
      # ─────────────────────────────────────────
      - name: Create Release
        if: success() && github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: Build #${{ github.run_number }}
          files: app/build/outputs/apk/debug/app-debug.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
