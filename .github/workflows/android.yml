name: Android CI/CD

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ─────────────────────────────────────────
      # 1. Checkout
      # ─────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ─────────────────────────────────────────
      # 2. Environment info
      # ─────────────────────────────────────────
      - name: Show environment info
        run: |
          echo "========================================="
          echo "  Runner OS : ${{ runner.os }}"
          echo "  Actor     : ${{ github.actor }}"
          echo "  Ref       : ${{ github.ref }}"
          echo "  Event     : ${{ github.event_name }}"
          echo "  Run #     : ${{ github.run_number }}"
          echo "  Commit    : ${{ github.sha }}"
          echo "========================================="
          java -version 2>&1 || true
          echo "-----------------------------------------"
          echo "Gradle wrapper version (declared):"
          grep distributionUrl gradle/wrapper/gradle-wrapper.properties || true

      # ─────────────────────────────────────────
      # 3. JDK 17
      # ─────────────────────────────────────────
      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      # ─────────────────────────────────────────
      # 4. Android SDK
      #    compileSdk=34, buildTools=34.0.0
      # ─────────────────────────────────────────
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install required SDK components
        run: |
          echo "=== Accepting SDK licenses ==="
          yes | sdkmanager --licenses 2>/dev/null || true
          echo "=== Installing SDK components ==="
          sdkmanager \
            "platform-tools" \
            "platforms;android-34" \
            "build-tools;34.0.0"
          echo "=== Installed SDK packages ==="
          sdkmanager --list_installed 2>/dev/null | grep -E "(platform-tools|platforms;android|build-tools)" || true

      # ─────────────────────────────────────────
      # 5. Setup Gradle (cache + build scan)
      # ─────────────────────────────────────────
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: wrapper   # pakai versi dari gradle-wrapper.properties

      # ─────────────────────────────────────────
      # 6. Fix gradlew + repair wrapper jar
      #    gradle-wrapper.jar di repo kosong (0 bytes)
      #    karena git tidak track binary besar.
      #    Download jar resmi sesuai versi di
      #    gradle-wrapper.properties (8.6).
      # ─────────────────────────────────────────
      - name: Fix gradlew & restore wrapper JAR
        run: |
          chmod +x gradlew
          sed -i 's/\r$//' gradlew

          echo "=== Check wrapper jar ==="
          JAR="gradle/wrapper/gradle-wrapper.jar"
          JAR_SIZE=$(stat -c%s "$JAR" 2>/dev/null || echo 0)
          echo "Current jar size: ${JAR_SIZE} bytes"

          if [ "$JAR_SIZE" -lt 10000 ]; then
            echo "⚠️  Wrapper JAR kosong/invalid — mendownload dari Gradle official..."

            # Baca versi dari properties
            GRADLE_VERSION=$(grep -oP '(?<=gradle-)[0-9]+\.[0-9]+(\.[0-9]+)?' \
              gradle/wrapper/gradle-wrapper.properties | head -1)
            echo "Gradle version: ${GRADLE_VERSION}"

            # Download jar resmi
            JAR_URL="https://raw.githubusercontent.com/gradle/gradle/v${GRADLE_VERSION}/gradle/wrapper/gradle-wrapper.jar"
            curl -sSfL "$JAR_URL" -o "$JAR" || {
              # fallback: pakai GitHub tag format
              JAR_URL2="https://github.com/gradle/gradle/raw/v${GRADLE_VERSION}/gradle/wrapper/gradle-wrapper.jar"
              curl -sSfL "$JAR_URL2" -o "$JAR"
            }

            echo "✅ Downloaded: $(stat -c%s "$JAR") bytes"
          else
            echo "✅ Wrapper JAR OK (${JAR_SIZE} bytes)"
          fi

          echo "=== Final wrapper state ==="
          ls -lh gradle/wrapper/

      # ─────────────────────────────────────────
      # 7. Print Gradle version
      # ─────────────────────────────────────────
      - name: Print Gradle version
        run: ./gradlew --version

      # ─────────────────────────────────────────
      # 8. Build Debug APK
      # ─────────────────────────────────────────
      - name: Build Debug APK
        run: |
          echo "=== Starting build ==="
          ./gradlew assembleDebug \
            --stacktrace \
            --info \
            --no-daemon \
            -Dorg.gradle.jvmargs="-Xmx2048m -XX:MaxMetaspaceSize=512m" \
            2>&1 | tee build_output.log
          echo "=== Build finished ==="

      # ─────────────────────────────────────────
      # 9. Verify APK
      # ─────────────────────────────────────────
      - name: Verify APK exists
        run: |
          APK="app/build/outputs/apk/debug/app-debug.apk"
          if [ -f "$APK" ]; then
            echo "✅ APK FOUND"
            ls -lh "$APK"
            echo "APK_PATH=$APK" >> $GITHUB_ENV
          else
            echo "❌ APK NOT FOUND — listing build outputs for debug:"
            find app/build/outputs -type f 2>/dev/null || echo "(no outputs directory)"
            exit 1
          fi

      # ─────────────────────────────────────────
      # 10. Upload APK artifact
      # ─────────────────────────────────────────
      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: MusicPlayer-debug-${{ github.run_number }}
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 14

      # ─────────────────────────────────────────
      # 11. Upload build log (always)
      # ─────────────────────────────────────────
      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-${{ github.run_number }}
          path: build_output.log
          retention-days: 7

      # ─────────────────────────────────────────
      # 12. Upload full Gradle logs on failure
      # ─────────────────────────────────────────
      - name: Upload Gradle failure logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: gradle-failure-logs-${{ github.run_number }}
          path: |
            build_output.log
            app/build/reports/
            ~/.gradle/daemon/**/daemon-*.log
          retention-days: 7

      # ─────────────────────────────────────────
      # 13. Create GitHub Release
      #     Hanya saat push ke main/master
      #     (bukan PR, bukan workflow_dispatch)
      # ─────────────────────────────────────────
      - name: Create GitHub Release
        if: success() && github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: "MusicPlayer Build #${{ github.run_number }}"
          body: |
            🎵 **MusicPlayer Debug Build**

            - Commit : `${{ github.sha }}`
            - Branch : `${{ github.ref_name }}`
            - Run    : #${{ github.run_number }}
            - Actor  : ${{ github.actor }}
          files: app/build/outputs/apk/debug/app-debug.apk
          draft: false
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
